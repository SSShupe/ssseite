[site]
title = "The Newest SSS Blog"
description = "A Little Bit about a Lot of Things"
base_url = "http://localhost:3000"
language = "en"
author = "Steve Shupe"

[[collections]]
name = "posts"
label = "Posts"
directory = "posts"
has_date = true
has_rss = true
listed = true
url_prefix = "/posts"
paginate = 5
default_template = "post.html"

[[collections]]
name = "fiction"
label = "Fiction"
directory = "fiction"
paginate = 5
has_date = true
has_rss = false
listed = true
url_prefix = "/fiction"
nested = false
default_template = "post.html"

[[collections]]
name = "docs"
label = "Documents"
directory = "docs"
has_date = true
has_rss = false
listed = true
url_prefix = "/docs"
nested = false
default_template = "doc.html"

[[collections]]
name = "pages"
label = "Pages"
directory = "pages"
has_date = false
has_rss = false
listed = false
url_prefix = ""
nested = false
default_template = "page.html"

[build]
output_dir = "dist"
content_dir = "content"
template_dir = "templates"
static_dir = "static"
data_dir = "data"
public_dir = "public"
minify = true

[deploy]
target = "cloudflare"
auto_commit = false

[languages]

[images]
widths = [
    480,
    800,
    1200,
]
quality = 90
lazy_loading = true
webp = true
avif_quality = 75
